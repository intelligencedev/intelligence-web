<!DOCTYPE html>
<html lang="en" data-theme="halo-dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>intelligence.dev</title>
        <meta
            name="description"
            content="intelligence.dev builds practical tools for applied intelligence—developer-first, privacy-aware, and designed to ship."
        />
        <style>
            /*
             * Halo (Dark) — tokens mirrored from
             * repos/manifold/web/agentd-ui/src/theme/themes.ts
             *
             * Design principle (from halo.css):
             *   "Structure from strokes, not glass.
             *    No blur, no gradients on surfaces, no stacked shadows."
             */
            :root {
                color-scheme: dark;

                /* Surface */
                --color-background:     8   9  12;
                --color-surface:       14  17  22;
                --color-surface-muted: 20  24  33;

                /* Strokes */
                --color-border:        30  35  44;

                /* Accent */
                --color-accent:       124 134 255;
                --color-accent-fg:     10  11  18;

                /* Foreground scale */
                --color-fg:           236 239 243;
                --color-fg-muted:     154 164 176;
                --color-fg-faint:      92 102 114;

                /* Radii */
                --r-sm:  6px;
                --r-md: 10px;

                /* Spacing */
                --page-x: clamp(20px, 5vw, 64px);

                /* Type */
                --font-sans: ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, "Segoe UI", sans-serif;
                --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco,
                    Consolas, "Liberation Mono", monospace;
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            html, body {
                height: 100%;
                overflow-x: hidden;
            }

            body {
                font-family: var(--font-sans);
                background: rgb(var(--color-background));
                color: rgb(var(--color-fg));
                font-size: 15px;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            ::selection {
                background: rgb(var(--color-accent) / 0.22);
                color: rgb(var(--color-fg));
            }

            a { color: inherit; text-decoration: none; }

            /* ── Galaxy backdrop — always fills the viewport ────────── */
            .galaxy {
                position: fixed;
                inset: 0;
                z-index: 0;
                overflow: hidden;
            }

            .galaxy iframe {
                width: 100%;
                height: 100%;
                border: 0;
            }

            /* ── Foreground layout ──────────────────────────────────── */
            .container {
                position: relative;
                z-index: 2;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                pointer-events: none;
            }

            /* ── Top bar — same structure as /articles/ ─────────────── */
            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 20px;
                padding: 13px var(--page-x);
                border-bottom: 1px solid rgb(var(--color-border) / 0.85);
                pointer-events: auto;
            }

            .brand {
                display: inline-flex;
                align-items: center;
                gap: 9px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                color: rgb(var(--color-fg));
            }

            .brand-mark {
                width: 8px;
                height: 8px;
                background: rgb(var(--color-accent));
                flex-shrink: 0;
            }

            .nav {
                display: flex;
                align-items: center;
                gap: 20px;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgb(var(--color-fg-muted));
            }

            .nav a {
                border-bottom: 1px solid transparent;
                padding-bottom: 1px;
                transition: color 140ms ease, border-color 140ms ease;
            }

            .nav a:hover,
            .nav a:focus-visible {
                color: rgb(var(--color-fg));
                border-bottom-color: rgb(var(--color-accent));
                outline: none;
            }

            /* ── Hero — quiet, factual, stroke-framed ───────────────── */
            .hero-wrap {
                flex: 1 0 auto;
                display: flex;
                align-items: flex-start;
                padding: clamp(40px, 9vh, 96px) var(--page-x) 48px;
            }

            .hero {
                pointer-events: auto;
                max-width: 560px;
                padding: 24px 26px 26px;
                background: rgb(var(--color-background) / 0.82);
                border: 1px solid rgb(var(--color-border));
                border-radius: var(--r-md);
            }

            .section-label {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 12px;
                font-family: var(--font-mono);
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: rgb(var(--color-fg-faint));
            }

            .section-label::before {
                content: "";
                display: block;
                width: 20px;
                height: 1px;
                background: rgb(var(--color-accent));
            }

            .hero-title {
                font-size: clamp(26px, 4vw, 34px);
                font-weight: 650;
                letter-spacing: -0.02em;
                line-height: 1.2;
                color: rgb(var(--color-fg));
            }

            .hero-title .dot {
                color: rgb(var(--color-accent));
            }

            .lead {
                margin-top: 10px;
                max-width: 480px;
                font-size: 15px;
                line-height: 1.6;
                color: rgb(var(--color-fg-muted));
            }

            /* ── Actions — stroke buttons, single accent ────────────── */
            .cta-row {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 22px;
            }

            .btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                border-radius: var(--r-sm);
                border: 1px solid rgb(var(--color-border));
                background: rgb(var(--color-surface));
                color: rgb(var(--color-fg-muted));
                font-family: var(--font-mono);
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                transition: color 140ms ease, border-color 140ms ease,
                    background 140ms ease;
            }

            .btn:hover,
            .btn:focus-visible {
                color: rgb(var(--color-fg));
                border-color: rgb(var(--color-accent));
                outline: none;
            }

            .btn:focus-visible {
                box-shadow: 0 0 0 3px rgb(var(--color-accent) / 0.25);
            }

            .btn-primary {
                background: rgb(var(--color-accent));
                border-color: rgb(var(--color-accent));
                color: rgb(var(--color-accent-fg));
            }

            .btn-primary:hover,
            .btn-primary:focus-visible {
                background: rgb(var(--color-accent) / 0.88);
                border-color: rgb(var(--color-accent));
                color: rgb(var(--color-accent-fg));
            }

            /* ── Footer line — pinned below the hero ────────────────── */
            .foot {
                pointer-events: auto;
                padding: 14px var(--page-x) 18px;
                border-top: 1px solid rgb(var(--color-border) / 0.85);
                font-family: var(--font-mono);
                font-size: 11px;
                letter-spacing: 0.06em;
                color: rgb(var(--color-fg-faint));
            }

            /* ── Responsive ─────────────────────────────────────────── */
            @media (max-width: 640px) {
                .topbar {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                }

                .hero {
                    padding: 20px 18px 22px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                * {
                    animation: none !important;
                    transition: none !important;
                }
            }
        </style>
    </head>
    <body class="halo">
        <div class="galaxy" aria-hidden="true">
            <iframe src="/vis/galaxy/" title="Galaxy background"></iframe>
        </div>

        <div class="container">
            <header class="topbar" aria-label="Site navigation">
                <a class="brand" href="/" aria-label="intelligence.dev home">
                    <span class="brand-mark" aria-hidden="true"></span>
                    intelligence.dev
                </a>
                <nav class="nav" aria-label="Primary navigation">
                    <a href="/articles/">Articles</a>
                    <a href="/manifold/">Manifold</a>
                </nav>
            </header>

            <div class="hero-wrap">
                <main class="hero" id="hero">
                    <p class="section-label">applied intelligence</p>
                    <h1 class="hero-title">intelligence<span class="dot">.</span>dev</h1>
                    <p class="lead">
                        Experiments with code, computer graphics, and machine learning.
                    </p>
                    <div class="cta-row" role="group" aria-label="Primary actions">
                        <a class="btn btn-primary" href="/manifold/">Manifold →</a>
                        <a class="btn" href="/articles/">Articles →</a>
                    </div>
                </main>
            </div>

            <footer class="foot">
                &copy; 2025 intelligence.dev
            </footer>
        </div>
    </body>
</html>
